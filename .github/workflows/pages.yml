name: Deploy to GitHub Pages

# 근원 수정 (2026-07-09): legacy branch-auto 배포가 cron 분당 push에 concurrency로 계속
# cancel → status errored → 라이브 픽 영영 미반영. Actions + cancel-in-progress:false 로
# 전환해 cron push해도 배포가 취소되지 않고 순차 완료(큐잉)되게 한다. DOC-20260709 근원.

# 근원 수정 (2026-07-16): on.push.paths allowlist 로 저가치 push(선물 us-indices 10분·
# wire·macro·kiwoom raw snapshot)가 배포를 트리거하지 않게 필터. GitHub Pages 배포는
# github-pages env latest-wins 라 저가치 push 폭주 시 배포 큐가 밀려(60건 연속 취소 관측)
# 15:20 픽 배포가 장중 라이브에 늦게 반영되는 근원. paths 는 OR 매치 — 아래 경로 중
# 하나라도 변경되면 트리거. 15:20 픽 커밋은 interpreted/themes/limit-up-trend/*.html 을
# 항상 동반하므로 확실히 트리거됨(실측 검증). DOC-20260716 근원.
on:
  push:
    branches: [main]
    paths:
      # 렌더 화면 데이터·픽 (포함) — 15:20 픽 배포 경로
      - 'data/interpreted/**'      # 해석 픽 (15:20 condition search)
      - 'data/pm320_history/**'    # 전수표·익절 상태 (장중 hook sync)
      - 'data/themes/**'           # 테마트리·테마맵·거래대금 추이
      - 'data/limit-up-trend.json' # 상한가 갯수 시계열
      - 'data/daily/**'            # 일별 집계
      - 'data/calendar/**'         # 일정 데이터 (픽 배포 동반)
      - 'data/holidays.json'       # 휴장일 달력 (isMarketClosed 휴장 뷰 전환 SoT — 2026-07-17 임시공휴일 사고)
      - 'data/page-manifest.json'  # 페이지 매니페스트 (렌더 라우팅)
      - 'og/pm320/**'              # 공유 OG 썸네일 (픽마다 생성)
      - 'js/**'                    # 프론트 렌더 로직
      - '**.html'                  # 카드·인덱스 등 모든 HTML
      - '.github/workflows/pages.yml' # 이 워크플로 자기 변경 반영
      # 제외(allowlist 부재로 자동 필터): pm320/data/**(wire·macro), data/us-indices/**(선물),
      # data/kiwoom/**(raw snapshot), data/dailybars/**·data/dailybars-nxt/**(확대차트 별도 fetch)
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# 🔴 핵심: 이전 배포를 취소하지 않고 큐잉 (cron push 폭주 시에도 순차 완료 보장)
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
